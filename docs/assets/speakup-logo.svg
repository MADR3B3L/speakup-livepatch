<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <rect width="600" height="600" rx="80" fill="#0a0a0a"/>

  <!-- Speech bubble -->
  <path d="M 160 180 Q 160 140 200 140 L 400 140 Q 440 140 440 180 L 440 320 Q 440 360 400 360 L 260 360 L 200 420 L 220 360 L 200 360 Q 160 360 160 320 Z" fill="none" stroke="#f0f0f0" stroke-width="8" stroke-linejoin="round"/>

  <!-- Sound waves coming out right side -->
  <path d="M 460 230 Q 490 250 460 270" fill="none" stroke="#f0f0f0" stroke-width="6" stroke-linecap="round"/>
  <path d="M 475 210 Q 520 250 475 290" fill="none" stroke="#888888" stroke-width="5" stroke-linecap="round"/>
  <path d="M 490 190 Q 550 250 490 310" fill="none" stroke="#444444" stroke-width="4" stroke-linecap="round"/>

  <!-- speakUP text -->
  <text x="300" y="510" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-size="72" fill="#f0f0f0" font-weight="300" letter-spacing="-1">speak<tspan font-weight="700">UP</tspan></text>
</svg>
